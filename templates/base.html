<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Поиск по ОВСЧ{% endblock %}</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', sans-serif; background: #f5f5f5; color: #333; }
        nav { background: #2c3e50; padding: 12px 32px; display: flex; align-items: center; gap: 24px; }
        nav a { color: #ecf0f1; text-decoration: none; font-size: 15px; }
        nav a:hover { text-decoration: underline; }
        nav .brand { font-weight: bold; font-size: 18px; color: white; }
        .container { max-width: 860px; margin: 40px auto; padding: 0 16px; }
        .card { background: white; border-radius: 8px; padding: 32px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
        h1 { font-size: 26px; margin-bottom: 12px; }
        h2 { font-size: 20px; margin-bottom: 16px; }
        .btn { background: #2c3e50; color: white; border: none; padding: 10px 24px;
               border-radius: 6px; cursor: pointer; font-size: 15px; text-decoration: none; display: inline-block; }
        .btn:hover { background: #34495e; }
        .notice { background: #eaf4ff; border-left: 4px solid #3498db; padding: 10px 16px;
                  border-radius: 4px; margin-bottom: 20px; font-size: 14px; color: #2c3e50; }
    </style>
</head>
<body>
<nav>
    <span class="brand">ОВСЧ Поиск</span>
    <a href="/">Главная</a>
    <a href="/search">Поиск</a>
</nav>
<div class="container">
    {% block content %}{% endblock %}
</div>
</body>
</html>
